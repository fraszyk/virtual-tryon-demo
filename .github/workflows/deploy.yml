name: Deploy to Azure Container Apps

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC login
  contents: read

env:
  IMAGE_NAME: virtual-tryon

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      # ── Azure login via OIDC (no stored passwords) ──────────────────────────
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ── Build & push Docker image to ACR ────────────────────────────────────
      - name: ACR login
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Set image tag
        id: tag
        run: echo "TAG=${{ secrets.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ steps.tag.outputs.TAG }}
            ${{ secrets.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest

      # ── Deploy new revision to Container Apps ────────────────────────────────
      - name: Deploy to Container Apps
        run: |
          az containerapp update \
            --name ca-virtual-tryon \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image ${{ steps.tag.outputs.TAG }}

      - name: Print app URL
        run: |
          az containerapp show \
            --name ca-virtual-tryon \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv
